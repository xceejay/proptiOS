<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ printf "%s | %s" .Title site.Title }}{{ end }}</title>
<meta name="description" content="{{ if .Params.description }}{{ .Params.description }}{{ else if .Params.details }}{{ .Params.details | plainify | truncate 160 }}{{ else }}proptiOS is property management software for teams managing residential, commercial, and mixed-use portfolios. Leasing, rent collection, maintenance, and reporting in one platform.{{ end }}">
<link rel="canonical" href="{{ .Permalink }}">

{{/* Open Graph */}}
<meta property="og:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | proptiOS{{ end }}">
<meta property="og:description" content="{{ if .Params.description }}{{ .Params.description }}{{ else }}Property management software for teams managing residential, commercial, and mixed-use portfolios.{{ end }}">
<meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="proptiOS">
<meta property="og:locale" content="en_US">

{{/* Twitter Card */}}
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | proptiOS{{ end }}">
<meta name="twitter:description" content="{{ if .Params.description }}{{ .Params.description }}{{ else }}Property management software for teams managing residential, commercial, and mixed-use portfolios.{{ end }}">

{{hugo.Generator}}
{{"<!-- Favicon -->" | safeHTML}}
<link rel="icon" type="image/png" href="/images/favicons/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/images/favicons/favicon.svg" />
<link rel="shortcut icon" href="/images/favicons/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/images/favicons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="proptiOS" />
<link rel="manifest" href="/images/favicons/site.webmanifest" />
{{"<!-- Fontawesome -->" | safeHTML}}
<link rel="stylesheet" href="{{"plugins/fontawesome/all.css" | absURL}}"/>

{{"<!-- AOS -->" | safeHTML}}
<link rel="stylesheet" href="{{"plugins/fancybox/fancybox.css" | absURL}}"/>


{{"<!-- Swiper -->" | safeHTML}}
<link rel="stylesheet" href="{{"plugins/swiper/swiper.css" | absURL}}"/>

{{"<!-- AOS -->" | safeHTML}}
<link rel="stylesheet" href="{{"plugins/aos/aos.css" | absURL}}"/>


{{ partialCached "head/css.html" . }}

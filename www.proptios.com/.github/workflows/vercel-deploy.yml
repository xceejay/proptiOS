name: Deploy Vercel

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_cmcv6jEBiWKR1eWbScRfJ9ZN
      VERCEL_PROJECT_ID: prj_3EgftHIaGshqOWMGlRN0nSj3nhQz
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Install global CSS build tooling
        run: npm install -g postcss postcss-cli autoprefixer tailwindcss postcss-import

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.145.0'
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Prepare static deploy bundle
        run: |
          rm -rf .vercel-static-deploy
          mkdir -p .vercel-static-deploy/.vercel
          rsync -a public/ .vercel-static-deploy/
          cp vercel.json .vercel-static-deploy/vercel.json
          cat > .vercel-static-deploy/.vercel/project.json <<EOF
          {"projectId":"${VERCEL_PROJECT_ID}","orgId":"${VERCEL_ORG_ID}","projectName":"proptios-landing"}
          EOF

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy preview for staging
        if: github.ref_name == 'staging'
        id: deploy_staging
        run: |
          cd .vercel-static-deploy
          deployment_url="$(vercel deploy --token "${{ secrets.VERCEL_TOKEN }}" --yes)"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Alias staging custom domain
        if: github.ref_name == 'staging'
        run: |
          vercel alias set "${{ steps.deploy_staging.outputs.deployment_url }}" staging.proptios.com \
            --token "${{ secrets.VERCEL_TOKEN }}" \
            --scope xceejays-projects

      - name: Deploy production
        if: github.ref_name == 'main'
        run: |
          cd .vercel-static-deploy
          vercel deploy --prod --token "${{ secrets.VERCEL_TOKEN }}" --yes

name: Deploy Vercel

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: www.proptios.com/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.145.0'
          extended: true

      - name: Build site with Hugo
        run: hugo --gc --minify

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Deploy preview for staging
        if: github.ref_name == 'staging'
        id: deploy_staging
        run: |
          deployment_url="$(vercel deploy ./public --token "${{ secrets.VERCEL_TOKEN }}" --scope xceejays-projects --yes)"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Alias staging custom domain
        if: github.ref_name == 'staging'
        run: |
          vercel alias set "${{ steps.deploy_staging.outputs.deployment_url }}" staging.proptios.com \
            --token "${{ secrets.VERCEL_TOKEN }}" \
            --scope xceejays-projects

      - name: Deploy production
        if: github.ref_name == 'main'
        run: |
          vercel deploy ./public --prod --token "${{ secrets.VERCEL_TOKEN }}" --scope xceejays-projects --yes

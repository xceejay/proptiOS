name: Deploy Vercel

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_cmcv6jEBiWKR1eWbScRfJ9ZN
      VERCEL_PROJECT_ID: prj_3EgftHIaGshqOWMGlRN0nSj3nhQz
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.145.0'
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy preview for staging
        if: github.ref_name == 'staging'
        id: deploy_staging
        run: |
          deployment_url="$(vercel deploy --prebuilt --token "${{ secrets.VERCEL_TOKEN }}" --yes)"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Alias staging custom domain
        if: github.ref_name == 'staging'
        run: |
          vercel alias set "${{ steps.deploy_staging.outputs.deployment_url }}" staging.proptios.com \
            --token "${{ secrets.VERCEL_TOKEN }}" \
            --scope xceejays-projects

      - name: Deploy production
        if: github.ref_name == 'main'
        run: |
          vercel deploy --prebuilt --prod --token "${{ secrets.VERCEL_TOKEN }}" --yes

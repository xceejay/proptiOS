name: Sync Downstream Repos

on:
  push:
    branches:
      - main

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      api_pm: ${{ steps.filter.outputs.api_pm }}
      www: ${{ steps.filter.outputs.www }}
      api_events: ${{ steps.filter.outputs.api_events }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'app.proptios.com/**'
            api_pm:
              - 'api.pm.proptios.com/**'
            www:
              - 'www.proptios.com/**'
            api_events:
              - 'api.events.proptios.com/**'

  sync:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.app == 'true' ||
      needs.detect-changes.outputs.api_pm == 'true' ||
      needs.detect-changes.outputs.www == 'true' ||
      needs.detect-changes.outputs.api_events == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.MONOREPO_SYNC_SSH_KEY }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Push app.proptios.com
        if: needs.detect-changes.outputs.app == 'true'
        run: ./scripts/split-push.sh app.proptios.com git@github.com:xceejay/app.proptios.com.git

      - name: Push api.pm.proptios.com
        if: needs.detect-changes.outputs.api_pm == 'true'
        run: ./scripts/split-push.sh api.pm.proptios.com git@github.com:xceejay/api.pm.proptios.com.git

      - name: Push www.proptios.com
        if: needs.detect-changes.outputs.www == 'true'
        run: ./scripts/split-push.sh www.proptios.com git@github.com:xceejay/www.proptios.com.git

      - name: Push api.events.proptios.com
        if: needs.detect-changes.outputs.api_events == 'true'
        run: ./scripts/split-push.sh api.events.proptios.com git@github.com:xceejay/api.events.proptios.com.git

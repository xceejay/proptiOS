name: Sync Downstream Repos

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Specific downstream target to process"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - app
          - api-pm
          - www
          - api-events
      dry_run:
        description: "Prepare subtree split without pushing"
        required: false
        default: true
        type: boolean

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.detect.outputs.app }}
      api_pm: ${{ steps.detect.outputs.api_pm }}
      www: ${{ steps.detect.outputs.www }}
      api_events: ${{ steps.detect.outputs.api_events }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: paths
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'app.proptios.com/**'
            api_pm:
              - 'api.pm.proptios.com/**'
            www:
              - 'www.proptios.com/**'
            api_events:
              - 'api.events.proptios.com/**'

      - id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ github.event.inputs.target }}"
            app=false
            api_pm=false
            www=false
            api_events=false

            if [ "$target" = "all" ] || [ "$target" = "app" ]; then app=true; fi
            if [ "$target" = "all" ] || [ "$target" = "api-pm" ]; then api_pm=true; fi
            if [ "$target" = "all" ] || [ "$target" = "www" ]; then www=true; fi
            if [ "$target" = "all" ] || [ "$target" = "api-events" ]; then api_events=true; fi
          else
            app="${{ steps.paths.outputs.app }}"
            api_pm="${{ steps.paths.outputs.api_pm }}"
            www="${{ steps.paths.outputs.www }}"
            api_events="${{ steps.paths.outputs.api_events }}"
          fi

          echo "app=$app" >> "$GITHUB_OUTPUT"
          echo "api_pm=$api_pm" >> "$GITHUB_OUTPUT"
          echo "www=$www" >> "$GITHUB_OUTPUT"
          echo "api_events=$api_events" >> "$GITHUB_OUTPUT"

  sync:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.app == 'true' ||
      needs.detect-changes.outputs.api_pm == 'true' ||
      needs.detect-changes.outputs.www == 'true' ||
      needs.detect-changes.outputs.api_events == 'true'
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config url."https://x-access-token:${{ secrets.DOWNSTREAM_SYNC_TOKEN }}@github.com/".insteadOf "git@github.com:"

      - name: Push app.proptios.com
        if: needs.detect-changes.outputs.app == 'true'
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            ./scripts/sync-target.sh --dry-run app
          else
            ./scripts/sync-target.sh app
          fi

      - name: Push api.pm.proptios.com
        if: needs.detect-changes.outputs.api_pm == 'true'
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            ./scripts/sync-target.sh --dry-run api-pm
          else
            ./scripts/sync-target.sh api-pm
          fi

      - name: Push www.proptios.com
        if: needs.detect-changes.outputs.www == 'true'
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            ./scripts/sync-target.sh --dry-run www
          else
            ./scripts/sync-target.sh www
          fi

      - name: Push api.events.proptios.com
        if: needs.detect-changes.outputs.api_events == 'true'
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            ./scripts/sync-target.sh --dry-run api-events
          else
            ./scripts/sync-target.sh api-events
          fi

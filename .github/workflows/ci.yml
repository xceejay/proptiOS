name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Specific project to validate"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - app
          - api-pm
          - www
          - api-events

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.detect.outputs.app }}
      api_pm: ${{ steps.detect.outputs.api_pm }}
      www: ${{ steps.detect.outputs.www }}
      api_events: ${{ steps.detect.outputs.api_events }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: paths
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'app.proptios.com/**'
            api_pm:
              - 'api.pm.proptios.com/**'
            www:
              - 'www.proptios.com/**'
            api_events:
              - 'api.events.proptios.com/**'

      - id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ github.event.inputs.target }}"
            app=false
            api_pm=false
            www=false
            api_events=false

            if [ "$target" = "all" ] || [ "$target" = "app" ]; then app=true; fi
            if [ "$target" = "all" ] || [ "$target" = "api-pm" ]; then api_pm=true; fi
            if [ "$target" = "all" ] || [ "$target" = "www" ]; then www=true; fi
            if [ "$target" = "all" ] || [ "$target" = "api-events" ]; then api_events=true; fi
          else
            app="${{ steps.paths.outputs.app }}"
            api_pm="${{ steps.paths.outputs.api_pm }}"
            www="${{ steps.paths.outputs.www }}"
            api_events="${{ steps.paths.outputs.api_events }}"
          fi

          echo "app=$app" >> "$GITHUB_OUTPUT"
          echo "api_pm=$api_pm" >> "$GITHUB_OUTPUT"
          echo "www=$www" >> "$GITHUB_OUTPUT"
          echo "api_events=$api_events" >> "$GITHUB_OUTPUT"

  app:
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install --dir app.proptios.com --frozen-lockfile
      - run: pnpm --dir app.proptios.com lint
      - run: pnpm --dir app.proptios.com test
      - run: pnpm --dir app.proptios.com build

  api-pm:
    needs: detect-changes
    if: needs.detect-changes.outputs.api_pm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install --dir api.pm.proptios.com --frozen-lockfile
      - run: node -e "const p=require('./api.pm.proptios.com/package.json'); if (!p.scripts?.test || p.scripts.test.includes('no test specified')) process.exit(0); process.exit(1)"
        continue-on-error: true
        id: detect_test
      - if: steps.detect_test.outcome == 'failure'
        run: pnpm --dir api.pm.proptios.com test

  www:
    needs: detect-changes
    if: needs.detect-changes.outputs.www == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install --dir www.proptios.com --frozen-lockfile
      - run: node -e "const p=require('./www.proptios.com/package.json'); if (!p.scripts?.test || p.scripts.test.includes('no test specified')) process.exit(0); process.exit(1)"
        continue-on-error: true
        id: detect_test
      - if: steps.detect_test.outcome == 'failure'
        run: pnpm --dir www.proptios.com test

  api-events:
    needs: detect-changes
    if: needs.detect-changes.outputs.api_events == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: api.events.proptios.com/go.mod
      - run: cd api.events.proptios.com && go test ./...

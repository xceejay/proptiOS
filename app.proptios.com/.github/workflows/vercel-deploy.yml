name: Deploy Vercel

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_cmcv6jEBiWKR1eWbScRfJ9ZN
      VERCEL_PROJECT_ID: prj_kH5SyzMGEi1c24xK7xDj9kmhaqiD
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --token "${{ secrets.VERCEL_TOKEN }}"

      - name: Build with Vercel
        run: vercel build --token "${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy preview for staging
        if: github.ref_name == 'staging'
        id: deploy_staging
        run: |
          deployment_url="$(vercel deploy --prebuilt --token "${{ secrets.VERCEL_TOKEN }}" --yes)"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Alias staging custom domain
        if: github.ref_name == 'staging'
        run: |
          vercel alias set "${{ steps.deploy_staging.outputs.deployment_url }}" app.staging.proptios.com \
            --token "${{ secrets.VERCEL_TOKEN }}" \
            --scope xceejays-projects
          vercel alias set "${{ steps.deploy_staging.outputs.deployment_url }}" '*.staging.proptios.com' \
            --token "${{ secrets.VERCEL_TOKEN }}" \
            --scope xceejays-projects

      - name: Deploy production
        if: github.ref_name == 'main'
        run: |
          vercel deploy --prebuilt --prod --token "${{ secrets.VERCEL_TOKEN }}" --yes
